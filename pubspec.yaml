name: movie_deck
description: A Flutter movie watchlist app with AI-powered recommendations.

publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  font_awesome_flutter: ^11.0.0
  page_transition: ^2.2.1
  image_picker: ^1.1.2
  intl: ^0.20.2
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  google_sign_in: ^7.2.0
  flutter_secure_storage: ^10.0.0
  hooks_riverpod: ^3.3.1
  flutter_hooks: ^0.21.3+1
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  google_generative_ai: ^0.4.6
  flutter_dotenv: ^6.0.1
  cached_network_image: ^3.4.1
  http: ^1.6.0
  connectivity_plus: ^6.1.4
  flutter_cache_manager: ^3.4.1
  palette_generator: ^0.3.3+4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  mocktail: ^1.0.4

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env
